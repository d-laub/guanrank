[workspace]
authors = ["d-laub <dlaub@ucsd.edu>"]
channels = ["conda-forge"]
name = "guanrank"
platforms = ["linux-64", "osx-arm64"]
version = "0.1.0"

[environments]
default = ["py310"]
py310 = ["py310"]
py311 = ["py311"]
py312 = ["py312"]
py313 = ["py313"]
py314 = ["py314"]

[tasks]

[dependencies]
python = ">=3.10"

[pypi-dependencies]
guanrank = { path = ".", editable = true }
numba = ">=0.65.0, <0.66"
numpy = ">=2.2.6, <3"

[feature.py310.dependencies]
python = "3.10.*"

[feature.py311.dependencies]
python = "3.11.*"

[feature.py312.dependencies]
python = "3.12.*"

[feature.py313.dependencies]
python = "3.13.*"

[feature.py314.dependencies]
python = "3.14.*"
