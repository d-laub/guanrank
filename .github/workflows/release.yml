name: Release

on:
  workflow_dispatch:
    inputs:
      increment:
        description: "Version bump (leave empty to auto-detect from conventional commits). One of: PATCH, MINOR, MAJOR, or empty."
        required: false
        type: string
        default: ""

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: bump, build, publish
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/guanrank/
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout main with full history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install commitizen
        run: uv tool install commitizen

      - name: Run cz bump
        id: bump
        run: |
          if [ -n "${{ inputs.increment }}" ]; then
            cz bump --yes --changelog --increment "${{ inputs.increment }}"
          else
            cz bump --yes --changelog
          fi
          NEW_VERSION="$(cz version --project)"
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VERSION}"   >> "$GITHUB_OUTPUT"

      - name: Push commit and tag
        run: |
          git push origin main
          git push origin "${{ steps.bump.outputs.tag }}"

      - name: Build sdist and wheel
        run: uv build

      - name: Extract changelog section for this version
        id: notes
        run: |
          python - <<'PY' "${{ steps.bump.outputs.version }}"
          import re, sys, pathlib
          version = sys.argv[1]
          text = pathlib.Path("CHANGELOG.md").read_text()
          pattern = rf"(^##\s.*{re.escape(version)}.*?$.*?)(?=^##\s|\Z)"
          m = re.search(pattern, text, flags=re.M | re.S)
          notes = m.group(1).strip() if m else f"Release {version}"
          pathlib.Path("RELEASE_NOTES.md").write_text(notes)
          PY

      # Create the (deletable) GitHub Release before the irreversible PyPI
      # upload, so a failure here never burns the version number on PyPI.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.bump.outputs.tag }}" \
            --title "${{ steps.bump.outputs.tag }}" \
            --notes-file RELEASE_NOTES.md \
            dist/*

      - name: Publish to PyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
